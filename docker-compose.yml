services:
  postgres:
    image: postgres:16-alpine
    container_name: pettrace-postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "${POSTGRES_PORT_BIND:-5432:5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pettrace-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_BIND:-6379:6379}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pettrace-web
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    working_dir: /app/src
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 5
    ports:
      - "${WEB_PORT_BIND:-8000:8000}"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pettrace-celery-worker
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
    working_dir: /app/src
    command: celery -A config worker --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pettrace-celery-beat
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
    working_dir: /app/src
    command: celery -A config beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pettrace-flower
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
    working_dir: /app/src
    command: celery -A config flower --port=5555
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${FLOWER_PORT_BIND:-5555:5555}"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pettrace-pgadmin
    restart: unless-stopped
    entrypoint: ["/pgadmin-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-pgadmin@pettrace.dev}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-change-me-please}"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/entrypoint.sh:/pgadmin-entrypoint.sh:ro
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "${PGADMIN_PORT_BIND:-5050:80}"

  nginx:
    image: nginx:1.27-alpine
    container_name: pettrace-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    profiles: ["prod"]
    ports:
      - "${NGINX_PORT_BIND:-80:80}"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro

volumes:
  pgadmin_data:
  postgres_data:
  static_volume:
  media_volume:
